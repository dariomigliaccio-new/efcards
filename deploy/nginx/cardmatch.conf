# Nginx config for CardMatch — Ubuntu 22.04 + Hostinger VPS
# Place at: /etc/nginx/sites-available/cardmatch
# sudo ln -s /etc/nginx/sites-available/cardmatch /etc/nginx/sites-enabled/
# sudo certbot --nginx -d yourdomain.com -d api.yourdomain.com

upstream cardmatch_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream cardmatch_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

# ─── Frontend ─────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection       "1; mode=block"  always;
    add_header Referrer-Policy        "strict-origin"  always;

    location / {
        proxy_pass         http://cardmatch_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Next.js static assets
    location /_next/static {
        proxy_pass http://cardmatch_frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /public {
        proxy_pass http://cardmatch_frontend;
        add_header Cache-Control "public, max-age=86400";
    }
}

# ─── API Backend ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://cardmatch_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Stripe webhook — disable buffering for raw body
    location /api/payments/webhook {
        proxy_pass         http://cardmatch_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_buffering    off;
        proxy_request_buffering off;
    }
}
